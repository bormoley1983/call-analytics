services:
  whisper_poc:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.base
    image: call-analytics-base:cuda12
    working_dir: /work
    volumes:
      - ./:/work
      - ./_hf_cache:/root/.cache/huggingface
      - ./config:/work/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - config/.env
    environment:
      # Override to ensure Docker host networking works
      - OLLAMA_URL=http://host.docker.internal:11434
    gpus: all
    command: ["python", "src/cli.py"]

  whisper_debug:
    pull_policy: never
    image: call-analytics-base:cuda12
    working_dir: /work
    volumes:
      - ./:/work
      - ./_hf_cache:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - config/.env
    environment:
      # Override to ensure Docker host networking works
      - OLLAMA_URL=http://host.docker.internal:11434
    gpus: all
    ports:
      - "5678:5678"
    command:
      - python
      - -Xfrozen_modules=off
      - -m
      - debugpy
      - --listen
      - 0.0.0.0:5678
      - --wait-for-client
      - src/cli.py